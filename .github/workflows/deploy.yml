name: Deploy to 8086 (Local Dev)

on:
  push:
    branches: [ main ]

  # Permet le déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:

jobs:
  deploy:
    name: "Deploy kya_hr vers serveur local 8086"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (docker exec)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_SSH_PORT || 22 }}
          script: |
            set -e

            # Configuration — surcharger via secrets si besoin
            COMPOSE_DIR="${DEV_COMPOSE_DIR:-/srv/kya-dev}"
            COMPOSE_FILE="${DEV_COMPOSE_FILE:-ERPNext_v16_Port8084/v16-hrms-8086.yml}"
            BACKEND="${DEV_BACKEND_CONTAINER:-kya-8086-backend-8086-1}"
            APPS_ROOT="${DEV_APPS_ROOT:-/srv/kya-dev}"
            SITE="${DEV_SITE_NAME:-frontend}"

            echo "=== [1/5] Pull kya_hr (volume monté) ==="
            cd "$APPS_ROOT/kya_hr"
            git fetch origin main
            git reset --hard origin/main

            echo "=== [2/5] Pull kya_services (volume monté) ==="
            cd "$APPS_ROOT/kya_services"
            git fetch origin main
            git reset --hard origin/main

            echo "=== [3/5] bench migrate ==="
            docker exec "$BACKEND" bench --site "$SITE" migrate

            echo "=== [4/5] Build assets ==="
            docker exec "$BACKEND" bench build --app kya_hr
            docker exec "$BACKEND" bench build --app kya_services

            echo "=== [5/5] Clear cache ==="
            docker exec "$BACKEND" bench --site "$SITE" clear-cache
            docker exec "$BACKEND" bench --site "$SITE" clear-website-cache

            echo "=== Déploiement 8086 terminé ==="
